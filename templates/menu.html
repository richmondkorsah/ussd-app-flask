<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoMo App Menu</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style/style.css') }}">
</head>
<body>
    <div class="container">
        <h1 class="title">MoMo App</h1>
        
        <div class="balance">
            <p class="balance-title">Account Balance</p>
            <p class="balance-text">Click on the eye icon to show/hide amount</p>
            <div class="balance-display">
                <span class="hidden-amount">********</span>
                <button class="eye-icon">&#128065;</button>
            </div>
        </div>

        <div class="menu-grid">
            <button class="menu-btn" onclick="window.location.href='{{ url_for('transfer') }}'">Transfer Money</button>
            <button class="menu-btn" onclick="window.location.href='{{ url_for('menu') }}'">Airtime & Bundles</button>
            <button class="menu-btn" onclick="window.location.href='{{ url_for('menu') }}'">Pay Bills</button>
            <button class="menu-btn" onclick="window.location.href='{{ url_for('menu') }}'">Allow Cash Out</button>
            <button class="menu-btn" onclick="window.location.href='{{ url_for('menu') }}'">Financial Services</button>
            <button class="menu-btn" onclick="window.location.href='{{ url_for('menu') }}'">Cash Out</button>
            <button class="menu-btn" onclick="window.location.href='{{ url_for('menu') }}'">Quick Transfer</button>
        </div>

        <div class="footer-buttons">
            <button class="footer-btn">Secure Transactions</button>
            <button class="footer-btn">View All Services</button>
        </div>
    </div>
</body>
</html>
